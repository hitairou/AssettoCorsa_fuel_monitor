[ENGINE]
; RPM threshold to consider engine ON (rpm > on_threshold AND gear > 0)
rpm_on_threshold       = 800
; RPM threshold to consider engine OFF (rpm < off_threshold)
rpm_off_threshold      = 500
engine_rpm_source      = calculated
engine_rpm_max         = 7500
engine_rpm_min         = 800

[FUEL]
; Fuel consumed per engine restart [mL]  -- PLACEHOLDER: measure on real hardware
start_penalty_ml       = 0.5

[SMOOTHING]
; Moving average window size for velocity smoothing (samples at 0.1 s each)
speed_window           = 5
; Moving average window size for grade_raw smoothing
grade_window           = 5

[TIMING]
; Main update interval [s]
update_interval_s      = 0.1

[RACE]
lap_distance_m         = 2202.0
race_total_laps        = 8
rule_time_limit_s      = 2536.70

[MEASUREMENT]
; session_start | first_cross_sf | manual_arm_then_cross_sf | auto_drive_start
measurement_start_mode           = auto_drive_start
auto_start_speed_kmh             = 1.0
auto_start_min_distance_m        = 1.0
auto_start_engine_required       = 0
; Ignore the partial lap that exists before measurement zero.
ignore_initial_partial_lap       = 1
; Use provisional current-lap projection once enough progress/time exists.
use_dynamic_8lap_estimate        = 1
min_progress_for_dynamic_estimate = 0.10
min_time_for_dynamic_estimate    = 10.0
; AC raw gear often differs from HUD gear by a fixed offset.
gear_display_offset              = -1

[GRADE]
; Index into carCoordinates[0..2] that represents vertical (height) axis.
; 0=X, 1=Y, 2=Z
; DEFAULT = 1 (Y-up, typical Unity/AC convention) -- CONFIRM by logging raw values
vertical_axis_index    = 1

; Fallback mode when dynamic estimation is unavailable.
; Options: pitch | csv | zero
grade_fallback_mode    = pitch

; Maximum absolute grade value -- values beyond this are clamped (noise guard)
grade_max_abs          = 0.5

; Minimum delta-distance [m] to compute a new grade sample
grade_min_ds           = 0.05

[POWER]
; Auto-scale the 10-second demand-power graph and diverging bars.
power_graph_auto_scale = 1
power_graph_window_s   = 10.0
power_graph_min_scale_w = 100.0
power_graph_max_scale_w = 5000.0
power_graph_scale_margin = 1.25
power_graph_scale_w    = 2000.0
power_graph_debug_overlay = 0

[DEBUG]
; Set to 1 to enable verbose logging to logs/debug.txt
debug_mode             = 0

[UI]
ui.preset              = overview
ui.restore_state       = 1
